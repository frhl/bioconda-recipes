{% set version = "1.0.16" %}

package:
  name: call-chets
  version: "{{ version }}"

source:
  url: https://github.com/frhl/call_chets/archive/refs/tags/{{ version }}.tar.gz
  sha256: 9b1a59cbc6169eb50138a58be82ec5fe3d95f126bbc6af5457f010d5255c5cd1

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('call-chets', max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - make
  host:
    - htslib
    - zlib
  run:
    - htslib
    - zlib

test:
  commands:
    - interpret_phase --help
    - make_pseudo_vcf --help
    - recode --help

about:
  home: https://github.com/frhl/call_chets
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "C++ tools for biallelic variant encoding and non-additive genotype recoding in VCFs"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
